<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- css imports -->
  <link rel="stylesheet" href="./CSS/main.css">
  <link rel="stylesheet" href="./CSS/blogCard.css">
  <link rel="stylesheet" href="./CSS/screenSettigns.css">

</head>
<body>

  <main aria-label="Blog article preview">

    <img class="main-image" src="./assets/images/illustration-article.svg" alt="Illustration representing the article topic">

    <section class="BlogContent" role="article" aria-labelledby="course-title">
      
      <article class="learning-status" role="note" aria-label="Learning category">
        Learning
      </article>
      
      <article class="publication-date" aria-label="Publication date">
        Published 21 Dec 2023
      </article>

      <h2 id="course-title" class="course-title">
        HTML & CSS foundations
      </h2>
      
      <article>
        <p class="courseDescription" aria-label="Article description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

      </article>

      <div class="instructor-section" role="group" aria-label="Article author">

        <img class="instructor-photo" src="./assets/images/image-avatar.webp" 
            alt="Greg Hooper's photo">
        
        <p aria-label="Author name">
          Greg Hooper
        </p>
      </div>


    </section>
  
  </main>
  
  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>
</html>
