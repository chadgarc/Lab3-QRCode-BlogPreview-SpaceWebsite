<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- css imports -->
  <link rel="stylesheet" href="./CSS/main.css">
  <link rel="stylesheet" href="./CSS/blogCard.css">
  <link rel="stylesheet" href="./CSS/screenSettigns.css">

</head>
<body class="d-grid 
            justify-content-center 
            align-items-center
            vh-100">

  <main class="d-flex
              flex-column
              justify-content-center
              p-4
              col-6
              mx-auto
              gap-4
              rounded-4
              "
        aria-label="Blog article preview">

    <img class="rounded-4
              main-image" src="./assets/images/illustration-article.svg" alt="Illustration representing the article topic">

    <section class="BlogContent
              d-flex
              justify-content-center
              flex-column
              gap-3" 
            role="article" aria-labelledby="course-title">
      
      <article class="d-flex
              justify-content-center
              align-items-center
              fw-bold
              rounded
              col-3
              py-1
              small
              learning-status" 
        role="note" aria-label="Learning category">
        <p class="small
                  my-0">
          Learning
        </p>
      </article>
      
      <!-- If I create another container inside one container, small class
      will reduce the size of the text again, this works in this case cuz the 
      text is reaaly small, more that fs-* class can handle-->
      
      <article >
        <p class="small
                  m-0
                  publication-date" 
        aria-label="Publication date">
          Published 21 Dec 2023
        </p >
      </article>
      

      <h2 id="course-title" class="m-0
                                  fs-4
                                  course-title">
        HTML & CSS foundations
      </h2>
      
      <article>
        <p class="fs-6
                  courseDescription" aria-label="Article description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

      </article>

      <div class="d-flex
                align-items-center
                fw-bold
                gap-3
                instructor-section" role="group" aria-label="Article author">

        <img class="instructor-photo" src="./assets/images/image-avatar.webp" 
            alt="Greg Hooper's photo">
        
        <p class="d-flex 
                m-0
                small
                align-items-center" 
            aria-label="Author name">
          Greg Hooper
        </p>
      </div>


    </section>
  
  </main>
  
</body>
</html>
